function nextYear() { const d=new Date(); d.setFullYear(d.getFullYear()+1); return d.toISOString().split("T")[0]; }

function statusInfo(reviewDate, days) {
  if (!reviewDate) return {label:"Unknown", cls:"due"};
  const diff = Math.floor((new Date(reviewDate)-new Date())/86400000);
  if (diff < 0) return {label:"⚠️ Overdue", cls:"overdue"};
  if (diff <= days) return {label:"⏰ Due Soon", cls:"due"};
  return {label:"✓ Current", cls:"current"};
}

// ── EMAIL REMINDER via mailto ──
function buildReminderEmail(products, settings, rd) {
  const overdue = products.filter(p => {
    if (!p.reviewDate) return false;
    return new Date(p.reviewDate) < new Date();
  });
  const due = products.filter(p => {
    if (!p.reviewDate) return false;
    const diff = Math.floor((new Date(p.reviewDate) - new Date()) / 86400000);
    return diff >= 0 && diff <= rd;
  });
  if (!overdue.length && !due.length) return null;

  const school = settings.schoolName || "Your School";
  const lines = [`COSHH Assessment Review Reminder — ${school}`, `Generated: ${new Date().toLocaleDateString("en-GB")}`, ""];

  if (overdue.length) {
    lines.push(`OVERDUE (${overdue.length}):`);
    overdue.forEach(p => lines.push(`  • ${p.productName} — review was due ${new Date(p.reviewDate).toLocaleDateString("en-GB")}`));
    lines.push("");
  }
  if (due.length) {
    lines.push(`DUE WITHIN ${rd} DAYS (${due.length}):`);
    due.forEach(p => lines.push(`  • ${p.productName} — review due ${new Date(p.reviewDate).toLocaleDateString("en-GB")}`));
    lines.push("");
  }
  lines.push("Please log in to your COSHH Manager to update these assessments.");
  lines.push("Remember: original risk assessments must be kept for 40 years.");
  return lines.join("\n");
}

// ── EXPORT REGISTER TO CSV ──
function exportToCSV(products) {
  const headers = [
    "Product Name","Manufacturer","Location","Task","Assessment Date","Review Date",
    "Status","SDS Ref","SDS Attached","Hazards","H Phrases","Substance Form",
    "Route of Entry","WEL","Storage","First Aid","Fire","Assessor","Manager","Saved"
  ];
  const escape = v => {
    if (v === null || v === undefined) return "";
    const s = Array.isArray(v) ? v.join("; ") : String(v);
    return s.includes(",") || s.includes('"') || s.includes("\n")
      ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const today = new Date();
  const rows = products.map(p => {
    const diff = p.reviewDate ? Math.floor((new Date(p.reviewDate) - today) / 86400000) : null;
    const status = diff === null ? "Unknown" : diff < 0 ? "Overdue" : diff <= 60 ? "Due Soon" : "Current";
    return [
      p.productName, p.manufacturer, p.location, p.task,
      p.assessDate ? new Date(p.assessDate).toLocaleDateString("en-GB") : "",
      p.reviewDate ? new Date(p.reviewDate).toLocaleDateString("en-GB") : "",
      status, p.sdsRef, p.sdsAttached,
      (p.hazards||[]).join("; "), p.hPhrases,
      p.substanceForm, (p.routeOfEntry||[]).join("; "), p.wel,
      p.storage, p.firstAid, p.fire,
      p.assessorName + (p.assessorTitle ? " / " + p.assessorTitle : ""),
      p.managerName + (p.managerTitle ? " / " + p.managerTitle : ""),
      p.savedAt ? new Date(p.savedAt).toLocaleDateString("en-GB") : ""
    ].map(escape).join(",");
  });
  const csv = [headers.join(","), ...rows].join("\n");
  const blob = new Blob([csv], {type: "text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `COSHH_Register_${new Date().toISOString().split("T")[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

        // Only use this result if we got a meaningful product name back
        if (extracted.json.productName || extracted.json.manufacturer || extracted.sdsUrl) {
          result = extracted;
          source = "hcc"; // found on HCC County Supplies
        }
      } catch(e) {
        // Stage 1 failed silently — proceed to stage 2
      }

      // ── STAGE 2: Fall back to general SDS search ──
      if (!result) {
        setAiStatus({type:"loading", msg:`🔍 Not found on County Supplies — searching manufacturer SDS...`});

        const stage2Prompt = `Find the official UK Safety Data Sheet (SDS/MSDS) for the cleaning product "${aiQuery}".
Check manufacturer websites and SDS databases.
Return ONLY this JSON: ${JSON_SCHEMA}
${JSON_RULES}`;

        const data2 = await callAPI([{role:"user", content:stage2Prompt}], 2);
        result = extractResult(data2);
        source = "general";
      }

      const {json, sdsUrl} = result;

      setForm(f => ({...f, ...json,
        assessDate: f.assessDate || today(),
        reviewDate: f.reviewDate || nextYear(),
        sdsUrl: sdsUrl || f.sdsUrl,
        sdsAttached: sdsUrl ? "Online" : f.sdsAttached,
      }));

      const sourceLabel = source === "hcc"
        ? `✓ Found on <strong>Hampshire County Supplies</strong>.`
        : `✓ Found via manufacturer SDS.`;
      const urlPart = sdsUrl
        ? ` <a href="${sdsUrl}" target="_blank" style="color:${GREEN};font-weight:600">View source SDS →</a>`
        : " Please review all fields before saving.";
      setAiStatus({type:"success", msg: sourceLabel + urlPart, isHtml:true});

    } catch(e) {
      console.error("Search error:", e);
      setAiStatus({type:"error", msg:`Search failed: ${e.message}. Please enter details manually or upload the SDS PDF.`});
    }
  }, [aiQuery]);

  // ── SAVE ──
  const saveProduct = () => {
    if (!form.productName) { alert("Please enter a product name."); return; }
    const record = {...form, id: editingId || Date.now().toString(), savedAt: new Date().toISOString()};
    setProducts(prev => {
      const idx = prev.findIndex(p => p.id === record.id);
      return idx >= 0 ? prev.map((p,i) => i===idx ? record : p) : [...prev, record];
    });
    setEditingId(null);
    setTab("register");
  };

  const saveAndPrint = () => {
    if (!form.productName) { alert("Please enter a product name."); return; }
    const record = {...form, id: editingId || Date.now().toString(), savedAt: new Date().toISOString()};
    setProducts(prev => {
      const idx = prev.findIndex(p => p.id === record.id);
      return idx >= 0 ? prev.map((p,i) => i===idx ? record : p) : [...prev, record];
    });
    setPrintData(record);
    setTab("print");
  };

  const editProduct = (id) => {
    const p = products.find(x => x.id === id);
    if (!p) return;
    setForm({...BLANK, ...p});
    setEditingId(id);
    setAiStatus(null);
    setTab("form");
  };

  const newAssessment = () => {
    setForm({...BLANK, assessDate:today(), reviewDate:nextYear(),
      assessorName:settings.assessorName, assessorTitle:settings.assessorTitle,
      managerName:settings.managerName});
    setEditingId(null);
    setAiStatus(null);
    setTab("form");
  };

  // ── REGISTER ──
  const rd = parseInt(settings.reminderDays)||60;
  const filtered = products.filter(p =>
    (p.productName||"").toLowerCase().includes(search.toLowerCase()) ||
    (p.manufacturer||"").toLowerCase().includes(search.toLowerCase())
  );
  const stats = products.reduce((a,p) => {
    const s = statusInfo(p.reviewDate, rd).cls;
    a[s] = (a[s]||0)+1; return a;
  }, {});
  const overdue = products.filter(p => statusInfo(p.reviewDate,rd).cls==="overdue");
  const due = products.filter(p => statusInfo(p.reviewDate,rd).cls==="due");

  // ─────────────────────────────────────────────────────────────────────────────
  return (
    <div style={S.app}>
      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        * { box-sizing: border-box; margin:0; padding:0; }
        body { font-family: 'DM Sans', system-ui, sans-serif; }
        input:focus, select:focus, textarea:focus { outline:none; border-color:${GREEN} !important; box-shadow: 0 0 0 3px rgba(0,176,80,.12); }
        @media print {
          .no-print { display:none !important; }
          .print-area { padding:6mm; }
          * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
          @page { size: A4 landscape; margin: 8mm; }
        }
        ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
      `}</style>

      {/* HEADER */}
      <header style={S.header}>
        <div style={{display:"flex", alignItems:"center", gap:10}}>
          <div style={{width:34,height:34,background:GREEN,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🛡️</div>
          <div>
            <div style={{color:"white",fontWeight:700,fontSize:15}}>COSHH Manager</div>
            <div style={{color:"rgba(255,255,255,.5)",fontSize:11}}>Hampshire County Council Template</div>
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,.1)",color:"rgba(255,255,255,.8)",padding:"4px 14px",borderRadius:20,fontSize:12}}>
          {settings.schoolName || "My School"}
        </div>
      </header>

      {/* TABS */}
      <div style={S.tabs} className="no-print">
        {[["register","📋 Register"],["form","➕ Assessment"],["print","🖨️ Print"],["settings","⚙️ Settings"]].map(([id,label]) =>
          <button key={id} style={S.tab(tab===id)} onClick={() => setTab(id)}>{label}</button>
        )}
      </div>

      <div style={S.main}>

        {/* ── REGISTER ── */}
        {tab === "register" && (
          <div>
            {(overdue.length > 0 || due.length > 0) && (
              <div style={{background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:8,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:20}}>⏰</span>
                <span style={{fontSize:13,color:"#92400e",flex:1}}>
                  {overdue.length > 0 && <strong>{overdue.length} assessment{overdue.length>1?"s":""} overdue! </strong>}
                  {due.length > 0 && `${due.length} assessment${due.length>1?"s":""} due for review within ${rd} days.`}
                </span>
              </div>
            )}

            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <div>
                <h2 style={{fontSize:20,fontWeight:700,color:NAVY}}>COSHH Product Register</h2>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{products.length} product{products.length!==1?"s":""} on register</div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button style={S.btn("ghost")} onClick={()=>exportToCSV(products)}
                  disabled={products.length===0} title="Export register to CSV">
                  ⬇️ Export CSV
                </button>
                <button style={S.btn("green")} onClick={newAssessment}>+ New Assessment</button>
              </div>
            </div>

            {/* Stats */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
              {[
                ["Total",products.length,"#0f172a"],
                ["Current",stats.current||0,GREEN],
                ["Due Soon",stats.due||0,"#d97706"],
                ["Overdue",stats.overdue||0,"#dc2626"],
              ].map(([l,v,c]) => (
                <div key={l} style={{...S.card,padding:"14px 18px"}}>
                  <div style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:".05em",color:"#64748b",marginBottom:4}}>{l}</div>
                  <div style={{fontSize:28,fontWeight:700,color:c,fontVariantNumeric:"tabular-nums"}}>{v}</div>
                </div>
              ))}
            </div>

            {/* Table */}
            <div style={S.card}>
              <div style={{padding:"12px 16px",borderBottom:"1px solid #e2e8f0"}}>
                <input value={search} onChange={e=>setSearch(e.target.value)}
                  placeholder="🔍  Search products..." style={{...S.input,maxWidth:400}} />
              </div>
              {filtered.length === 0 ? (
                <div style={{textAlign:"center",padding:"48px 20px",color:"#64748b"}}>
                  <div style={{fontSize:40,marginBottom:12}}>📋</div>
                  <div style={{fontWeight:600,marginBottom:6}}>{products.length===0?"No assessments yet":"No results"}</div>
                  {products.length===0 && <button style={S.btn("green")} onClick={newAssessment}>+ New Assessment</button>}
                </div>
              ) : (
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead>
                    <tr style={{background:"#f8fafc"}}>
                      {["Product","Manufacturer","Location","Stock","Assessed","Review Due","Status",""].map(h =>
                        <th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:600,
                          textTransform:"uppercase",letterSpacing:".04em",color:"#64748b",
                          borderBottom:"1px solid #e2e8f0",whiteSpace:"nowrap"}}>{h}</th>
                      )}
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map(p => {
                      const st = statusInfo(p.reviewDate, rd);
                      return (
                        <tr key={p.id} style={{borderBottom:"1px solid #f1f5f9"}}>
                          <td style={{padding:"12px 14px"}}>
                            <div style={{fontWeight:600,fontSize:13}}>{p.productName}</div>
                            <div style={{fontSize:11,color:"#64748b"}}>{p.task}</div>
                          </td>
                          <td style={{padding:"12px 14px",fontSize:13}}>{p.manufacturer||"—"}</td>
                          <td style={{padding:"12px 14px",fontSize:13}}>{p.location||"—"}</td>
                          <td style={{padding:"12px 14px",fontSize:13,color:p.amountStored?"#334155":"#94a3b8"}}>{p.amountStored||"—"}</td>
                          <td style={{padding:"12px 14px",fontSize:13}}>{fmtDate(p.assessDate)}</td>
                          <td style={{padding:"12px 14px",fontSize:13}}>{fmtDate(p.reviewDate)}</td>
                          <td style={{padding:"12px 14px"}}><span style={S.badge(st.cls)}>{st.label}</span></td>
                          <td style={{padding:"12px 14px",whiteSpace:"nowrap"}}>
                            <button onClick={()=>editProduct(p.id)} style={{...S.btn("ghost"),marginRight:4,fontSize:12,padding:"5px 10px"}}>✏️ Edit</button>
                            <button onClick={()=>{setPrintData(p);setTab("print");}} style={{...S.btn("ghost"),marginRight:4,fontSize:12,padding:"5px 10px"}}>🖨️</button>
                            {(p.sdsData||p.sdsUrl) && (
                              <button onClick={()=>viewSDS(p)} style={{...S.btn("ghost"),marginRight:4,fontSize:12,padding:"5px 10px",color:GREEN}} title="View original SDS">📄 SDS</button>
                            )}
                            <button onClick={()=>setDeleteTarget(p)} style={{...S.btn("ghost"),fontSize:12,padding:"5px 10px",color:"#dc2626"}}>🗑️</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        )}

        {/* ── FORM ── */}
        {tab === "form" && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:20,alignItems:"start"}}>
            {/* Main form */}
            <div style={S.card}>
              <div style={S.cardHead}>
                <div>
                  <span style={{fontWeight:700,color:NAVY}}>{editingId ? "Edit Assessment" : "New COSHH Assessment"}</span>
                  {!editingId && <div style={{fontSize:11,color:"#64748b",fontStyle:"italic",marginTop:2}}>Subject to Control of Substances Hazardous to Health Regulations</div>}
                </div>
              </div>
              <div style={S.cardBody}>
                <p style={{fontSize:13,color:"#334155",fontStyle:"italic",marginBottom:14,padding:"10px 12px",background:"#f1f5f9",borderLeft:"3px solid #00b050",borderRadius:"0 6px 6px 0"}}>
                  This risk assessment is to be used to identify the risks and control measures required for hazardous substances but not Zoonosis or Biological agents.
                </p>

                <div style={S.secTitle}>Section 1 — Product & Company Details</div>
                <div style={S.grid2}>
                  <Field label="Name of Hazardous Substance *"><Input value={form.productName} onChange={upd("productName")} placeholder="e.g. Mr Muscle Window & Glass" /></Field>
                  <Field label="Description of Process"><Input value={form.processDesc} onChange={upd("processDesc")} placeholder="e.g. Window cleaning" /></Field>
                  <Field label="Date of Assessment"><Input type="date" value={form.assessDate} onChange={upd("assessDate")} /></Field>
                  <Field label="Date of Review (Annual)"><Input type="date" value={form.reviewDate} onChange={upd("reviewDate")} /></Field>
                  <Field label="Manufacturer *"><Input value={form.manufacturer} onChange={upd("manufacturer")} placeholder="e.g. SC Johnson Ltd" /></Field>
                  <Field label="Manufacturer Tel No."><Input value={form.mfrTel} onChange={upd("mfrTel")} /></Field>
                  <Field label="Manufacturer Address" span2><Input value={form.mfrAddress} onChange={upd("mfrAddress")} /></Field>
                  <Field label="SDS Reference & Date"><Input value={form.sdsRef} onChange={upd("sdsRef")} placeholder="e.g. Version 1.0, Jan 2024" /></Field>
                  <Field label="SDS Attached?">
                    <Select value={form.sdsAttached} onChange={upd("sdsAttached")}
                      options={[{v:"Yes",l:"Yes — attached"},{v:"No",l:"No — not yet obtained"},{v:"Online",l:"Online — link available"}]} />
                  </Field>
                  <Field label="SDS URL (optional — paste link to online SDS)" span2>
                    <div style={{display:"flex",gap:8}}>
                      <Input value={form.sdsUrl} onChange={upd("sdsUrl")} placeholder="https://..." />
                      {form.sdsUrl && (
                        <button type="button" onClick={()=>window.open(form.sdsUrl,"_blank")}
                          style={{...S.btn("ghost"),whiteSpace:"nowrap",fontSize:12,padding:"6px 12px"}}>
                          🔗 View
                        </button>
                      )}
                    </div>
                  </Field>
                </div>

                <div style={S.secTitle}>Section 2 — Location & Activity</div>
                <div style={S.grid2}>
                  <Field label="Location of Activity"><Input value={form.location} onChange={upd("location")} placeholder="e.g. Classrooms, Corridors" /></Field>
                  <Field label="Task or Process"><Input value={form.task} onChange={upd("task")} placeholder="e.g. Surface cleaning" /></Field>
                </div>

                <div style={S.secTitle}>Section 3 — Hazard Classification</div>
                <p style={{fontSize:12,color:"#64748b",marginBottom:10}}>Click to tick applicable GHS hazard pictograms:</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                  {HAZARDS.map(h => (
                    <div key={h.key} onClick={()=>toggleHazard(h.key)}
                      style={{border:`2px solid ${form.hazards.includes(h.key)?"#d97706":"#e2e8f0"}`,
                        background:form.hazards.includes(h.key)?"#fef3c7":"white",
                        borderRadius:8,padding:"8px 6px",textAlign:"center",cursor:"pointer",
                        transition:"all .15s",userSelect:"none"}}>
                      <img src={HIMGS[h.img]} alt={h.label} style={{width:40,height:40,objectFit:"contain",display:"block",margin:"0 auto 4px"}} />
                      <div style={{fontSize:10,color:"#64748b",lineHeight:1.3,fontWeight:500}}>{h.label}</div>
                    </div>
                  ))}
                </div>
                <Field label="Please identify the Hazard (H) Phrase">
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <Input value={form.hPhrasesNone?"None required":form.hPhrases} onChange={upd("hPhrases")} disabled={form.hPhrasesNone} placeholder="e.g. H315 – Causes skin irritation." />
                    <CB label="None" checked={form.hPhrasesNone} onChange={v=>setForm(f=>({...f,hPhrasesNone:v,hPhrases:v?"None required":""}))} />
                  </div>
                </Field>

                <div style={S.secTitle}>Section 4 — About the Substance</div>
                <p style={{fontSize:12,color:"#92400e",fontStyle:"italic",background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:6,padding:"6px 10px",marginBottom:12}}>
                  Please note that the use of pesticides/herbicides, must be recorded on the Pesticide Record sheet.
                </p>
                <div style={S.grid3}>
                  <Field label="In what form is the substance being used/supplied or created?">
                    <Select value={form.substanceForm} onChange={upd("substanceForm")}
                      options={["","Liquid","Solid","Gas / Vapour","Aerosol / Spray","Powder / Dust","Gel / Paste","Foam"]} />
                  </Field>
                  <Field label="Additional Preparation Required Prior to Use"><Input value={form.prepRequired} onChange={upd("prepRequired")} placeholder="e.g. None / Dilute" /></Field>
                  <Field label="Dilution / Mix Ratio"><Input value={form.dilution} onChange={upd("dilution")} placeholder="e.g. RTU / 1:10" /></Field>
                </div>
                <div style={{...S.grid2,marginTop:14}}>
                  <Field label="Likely Route(s) of Entry — tick all that apply">
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,padding:"8px 0"}}>
                      {["Inhalation","Skin contact","Eye contact","Ingestion","Skin absorption","Injection"].map(r =>
                        <CB key={r} label={r} checked={form.routeOfEntry.includes(r)} onChange={()=>toggleRoute(r)} />
                      )}
                    </div>
                  </Field>
                  <div style={{display:"flex",flexDirection:"column",gap:14}}>
                    <Field label="Does the substance have a workplace exposure limit?">
                      <Select value={form.wel} onChange={upd("wel")} options={["No","Yes","Unknown"]} />
                    </Field>
                    <Field label="Is there the potential for it to be exceeded?">
                      <Select value={form.welExceeded} onChange={upd("welExceeded")} options={["No","Yes","N/A"]} />
                    </Field>
                    <Field label="If the answer is 'Yes' to above question, have you contacted H&S advisor and recorded recommended actions?">
                      <Select value={form.welHSContacted} onChange={upd("welHSContacted")} options={["N/A","Yes","No — action required"]} />
                    </Field>
                  </div>
                </div>
                <div style={{...S.grid3,marginTop:14}}>
                  <Field label="Amount of substance supplied/stored on site"><Input value={form.amountStored} onChange={upd("amountStored")} placeholder="e.g. 2 × 750ml" /></Field>
                  <Field label="Total amount used or generated per operation"><Input value={form.amountUsed} onChange={upd("amountUsed")} placeholder="e.g. 750ml" /></Field>
                  <Field label="Method of application/generation"><Input value={form.method} onChange={upd("method")} placeholder="e.g. Spray and wipe" /></Field>
                  <Field label="Duration of exposure per application/operation"><Input value={form.duration} onChange={upd("duration")} placeholder="e.g. <30 mins" /></Field>
                  <Field label="Frequency of Exposure - how often is the exposure/product used?">
                    <Select value={form.frequency} onChange={upd("frequency")}
                      options={["","Daily","Weekly","Fortnightly","Monthly","Termly","As required"]} />
                  </Field>
                  <Field label="Substance used as a stand-alone product?">
                    <Select value={form.standalone} onChange={upd("standalone")}
                      options={["Yes","No"]} />
                  </Field>
                  <Field label="Used with a combination of substances?">
                    <Select value={form.accumulated} onChange={upd("accumulated")}
                      options={["No","Yes","N/A"]} />
                  </Field>
                  <Field label="Accumulation of effects of similar constituents considered?">
                    <Select value={form.separateAssess} onChange={upd("separateAssess")}
                      options={["No","Yes","N/A"]} />
                  </Field>
                  <Field label="Separate assessment in place for accumulated effects." span2>
                    <div style={{display:"flex",flexDirection:"column",gap:8,paddingTop:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <input type="radio" id="separateAssessYes" name="separateAssessConfirm"
                          checked={form.separateAssessConfirm===true}
                          onChange={()=>setForm(f=>({...f,separateAssessConfirm:true}))}
                          style={{width:16,height:16,accentColor:GREEN,cursor:"pointer"}} />
                        <label htmlFor="separateAssessYes" style={{fontSize:13,cursor:"pointer"}}>Yes — separate assessment in place</label>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <input type="radio" id="separateAssessNo" name="separateAssessConfirm"
                          checked={form.separateAssessConfirm===false}
                          onChange={()=>setForm(f=>({...f,separateAssessConfirm:false}))}
                          style={{width:16,height:16,accentColor:"#dc2626",cursor:"pointer"}} />
                        <label htmlFor="separateAssessNo" style={{fontSize:13,cursor:"pointer",color:"#dc2626"}}>No — a separate assessment to be completed</label>
                      </div>
                    </div>
                  </Field>
                </div>

                <div style={S.secTitle}>Section 5 — Controls Required</div>
                <p style={{fontSize:12,color:"#334155",fontWeight:600,marginBottom:6}}>What controls are required for all activities identified in this assessment, and what has been implemented on the specific site?</p>
                <p style={{fontSize:12,color:"#64748b",fontStyle:"italic",marginBottom:12}}>NB: Controls are identified within Safety Data Sheets, and guidance found in the Corporate PPE procedure for PPE and RPE.</p>

                {/* Controls Table */}
                <div style={{overflowX:"auto",marginBottom:14}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{background:"#d4edda"}}>
                        <th colSpan={2} style={{border:"1px solid #94a3b8",padding:"6px 8px",textAlign:"left",width:"28%"}}>Means of Protection</th>
                        <th style={{border:"1px solid #94a3b8",padding:"6px 8px",textAlign:"center",width:"8%"}}>Control Required</th>
                        <th style={{border:"1px solid #94a3b8",padding:"6px 8px",textAlign:"left"}}>Control Mechanism / Notes</th>
                        <th style={{border:"1px solid #94a3b8",padding:"6px 8px",textAlign:"center",width:"10%"}}>Action No.</th>
                      </tr>
                    </thead>
                    <tbody>
                      {/* Ventilation */}
                      {[
                        ["ventGeneral","General ventilation","ventGeneralMech","ventGeneralAction"],
                        ["ventLEV","Local Exhaust Ventilation (LEV)","ventLEVMech","ventLEVAction"],
                        ["airMonitor","Air monitoring","airMonitorMech","airMonitorAction"],
                        ["ventNA","Not applicable","",""],
                      ].map(([key,label,mechKey,actKey],i) => (
                        <tr key={key}>
                          {i===0 && <td rowSpan={4} style={{border:"1px solid #94a3b8",padding:"6px 8px",fontWeight:600,verticalAlign:"middle",textAlign:"center"}}>Ventilation</td>}
                          <td style={{border:"1px solid #94a3b8",padding:"6px 8px"}}>{label}</td>
                          <td style={{border:"1px solid #94a3b8",padding:"4px 6px",textAlign:"center"}}>
                            <input type="checkbox" checked={!!form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.checked}))} style={{width:15,height:15,accentColor:GREEN,cursor:"pointer"}} />
                          </td>
                          <td style={{border:"1px solid #94a3b8",padding:"4px 6px"}}>
                            {mechKey ? <input value={form[mechKey]||""} onChange={e=>setForm(f=>({...f,[mechKey]:e.target.value}))} placeholder="Describe control mechanism..." style={{...S.input,padding:"3px 6px",fontSize:11}} /> : null}
                          </td>
                          <td style={{border:"1px solid #94a3b8",padding:"4px 6px"}}>
                            {actKey ? <input value={form[actKey]||""} onChange={e=>setForm(f=>({...f,[actKey]:e.target.value}))} style={{...S.input,padding:"3px 6px",fontSize:11,textAlign:"center"}} /> : null}
                          </td>
                        </tr>
                      ))}
                      {/* Skin Protection */}
                      {[
                        ["preCreams","Pre-work creams","preCreamsDesc","preCreamsAction"],
                        ["gloves","Hand protection / Gloves","glovesDesc","glovesAction"],
                        ["apron","Body protection / Apron","apronDesc","apronAction"],
                        ["footwear","Protective footwear","footwearType","footwearAction"],
                        ["skinNA","Not applicable","",""],
                      ].map(([key,label,mechKey,actKey],i) => (
                        <tr key={key}>

                  <div style={{color:"rgba(255,255,255,.6)",fontSize:12,marginTop:2}}>Upload PDF or image — saved with assessment</div>
                </div>
                <div style={{padding:16}}>
                  <div onClick={()=>document.getElementById("sdsUpload").click()}
                    style={{border:"2px dashed #cbd5e1",borderRadius:8,padding:20,textAlign:"center",

                    onMouseEnter={e=>{e.currentTarget.style.borderColor=GREEN;e.currentTarget.style.background="#e6f7ee"}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="#cbd5e1";e.currentTarget.style.background="#f8fafc"}}>

                    <div style={{fontSize:12,color:"#64748b"}}>
                      {sdsLoading ? "Extracting SDS data..." : <><strong style={{color:GREEN}}>Click to upload</strong> or drag & drop<br/>PDF, PNG or JPG · auto-fills the form</>}

                  {form.sdsData && (

                      background:"#e6f7ee",border:"1px solid #b3e6cc",borderRadius:8,marginTop:10}}>

                  {["Always verify AI-populated fields before saving.","Review dates auto-set to 12 months from assessment.","Original risk assessments must be kept for 40 years.","Pesticide/herbicide use must be recorded separately."].map(t =>

          <div>

              <div style={{display:"flex",gap:10}}>

                <button style={S.btn("green")} onClick={()=>{
                  const name = printData?.productName || "COSHH-Assessment";
                  const safe = name.replace(/[^a-zA-Z0-9]/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "");
                  const prev = document.title;
                  document.title = safe;
                  window.print();
                  document.title = prev;
                }}>🖨️ Print / Save PDF</button>

            </div>
            {printData ? <PrintPreview p={printData} school={settings.schoolName} addr={settings.schoolAddress} /> : (
              <div style={{textAlign:"center",padding:60,color:"#64748b"}}>

              </div>
            )}

        {/* ── SETTINGS ── */}
        {tab === "settings" && (
          <div style={{...S.card,maxWidth:540}}>
            <div style={S.cardHead}><span style={{fontWeight:700,color:NAVY}}>⚙️ Settings</span></div>
            <div style={S.cardBody}>
              <div style={S.secTitle}>School Details</div>
              <div style={{...S.grid2,marginBottom:14}}>
                <Field label="School Name"><Input value={settings.schoolName} onChange={v=>setSettings(s=>({...s,schoolName:v}))} /></Field>
                <Field label="School Address"><Input value={settings.schoolAddress} onChange={v=>setSettings(s=>({...s,schoolAddress:v}))} /></Field>
                <Field label="Default Assessor Name"><Input value={settings.assessorName} onChange={v=>setSettings(s=>({...s,assessorName:v}))} /></Field>
                <Field label="Default Assessor Title"><Input value={settings.assessorTitle} onChange={v=>setSettings(s=>({...s,assessorTitle:v}))} placeholder="e.g. Site Manager" /></Field>

              </div>

              <div style={S.secTitle}>AI Search — Anthropic API Key</div>
              <div style={{fontSize:13,color:"#64748b",marginBottom:12,lineHeight:1.6}}>

              </div>
              <div style={{...S.grid2,marginBottom:14}}>
                <Field label="Anthropic API Key" span2>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <input
                      type="password"
                      value={settings.apiKey||""}
                      onChange={e=>setSettings(s=>({...s,apiKey:e.target.value}))}
                      placeholder="sk-ant-..."
                      style={{...S.input,flex:1,fontFamily:"monospace",fontSize:13}}
                    />
                    {settings.apiKey && <span style={{fontSize:12,color:"#00b050",whiteSpace:"nowrap"}}>✓ Key saved</span>}
                  </div>
                </Field>
              </div>

              <div style={{...S.grid2,marginBottom:14}}>
                <Field label="Reminder (days before review)">
                  <Select value={String(settings.reminderDays)} onChange={v=>setSettings(s=>({...s,reminderDays:parseInt(v)}))}
                    options={[{v:"30",l:"30 days"},{v:"60",l:"60 days"},{v:"90",l:"90 days"}]} />
                </Field>
              </div>

              <div style={S.secTitle}>Annual Review Email Reminders</div>
              <div style={{fontSize:13,color:"#64748b",marginBottom:12,lineHeight:1.6}}>
                Enter your email address below. When you click <strong>Send Reminder Email</strong>, your email app will open with a pre-written reminder listing all overdue and due-soon assessments. Send it to yourself as a reminder, or CC your headteacher.
              </div>
              <div style={{...S.grid2,marginBottom:14}}>
                <Field label="Reminder Email Address" span2>
                  <Input type="email" value={settings.email||""} onChange={v=>setSettings(s=>({...s,email:v}))}
                    placeholder="e.g. caretaker@oakwood.sch.uk" />
                </Field>
              </div>
              {(() => {
                const rd = parseInt(settings.reminderDays)||60;
                const body = buildReminderEmail(products, settings, rd);
                const overdue = products.filter(p => p.reviewDate && new Date(p.reviewDate) < new Date());
                const due = products.filter(p => {
                  if (!p.reviewDate) return false;
                  const diff = Math.floor((new Date(p.reviewDate)-new Date())/86400000);
                  return diff >= 0 && diff <= rd;
                });
                const total = overdue.length + due.length;
                const subject = encodeURIComponent(`COSHH Review Reminder — ${settings.schoolName||"School"} — ${new Date().toLocaleDateString("en-GB")}`);
                const bodyEnc = encodeURIComponent(body||"No assessments currently due.");
                const mailtoHref = `mailto:${settings.email||""}?subject=${subject}&body=${bodyEnc}`;
                return (
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8,flexWrap:"wrap"}}>
                    <a href={mailtoHref}
                      style={{...S.btn("green"),textDecoration:"none",display:"inline-flex",alignItems:"center",gap:6,
                        opacity:settings.email?1:0.5,pointerEvents:settings.email?"auto":"none"}}
                      onClick={()=>setEmailStatus(total>0?"sent":"nothing-due")}>
                      ✉️ Send Reminder Email
                    </a>
                    {!settings.email && <span style={{fontSize:12,color:"#dc2626"}}>Enter an email address above first</span>}
                    {settings.email && total===0 && <span style={{fontSize:12,color:GREEN}}>✓ No assessments currently overdue or due soon</span>}
                    {settings.email && total>0 && <span style={{fontSize:12,color:"#d97706"}}>
                      ⚠️ {overdue.length>0&&`${overdue.length} overdue`}{overdue.length>0&&due.length>0&&", "}{due.length>0&&`${due.length} due soon`}
                    </span>}
                  </div>
                );
              })()}
              {emailStatus==="sent" && (
                <div style={{...S.aiBox,fontSize:12,marginBottom:12}}>
                  ✓ Your email app has opened with the reminder. Check your drafts if it did not send automatically.
                </div>
              )}
              <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>
                💡 Tip: Set a calendar reminder to click this button once a year (or once a term) to stay on top of reviews.
              </div>

              <div style={S.secTitle}>Export Product Register</div>
              <div style={{fontSize:13,color:"#64748b",marginBottom:12,lineHeight:1.6}}>
                Download the full COSHH product register as a CSV spreadsheet. Opens in Excel or Google Sheets.
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <button style={S.btn("green")} onClick={()=>exportToCSV(products)}
                  disabled={products.length===0}>
                  ⬇️ Export Register to CSV
                </button>
                {products.length===0
                  ? <span style={{fontSize:12,color:"#94a3b8"}}>No products in register yet</span>
                  : <span style={{fontSize:12,color:"#64748b"}}>{products.length} product{products.length!==1?"s":""} will be exported</span>}
              </div>
            </div>
            <div style={{...S.cardHead,borderTop:"1px solid #e2e8f0",borderBottom:"none",justifyContent:"flex-end",background:"#f8fafc"}}>
              <span style={{fontSize:12,color:GREEN}}>✓ Settings save automatically</span>
            </div>
          </div>
        )}
      </div>

      {/* DELETE MODAL */}
      {deleteTarget && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{...S.card,maxWidth:400,width:"100%",padding:24}}>
            <div style={{fontWeight:700,fontSize:16,color:NAVY,marginBottom:10}}>Delete Assessment?</div>
            <div style={{fontSize:14,color:"#334155",marginBottom:20}}>This will permanently remove <strong>{deleteTarget.productName}</strong>. This cannot be undone.</div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button style={S.btn("ghost")} onClick={()=>setDeleteTarget(null)}>Cancel</button>
              <button style={S.btn("danger")} onClick={()=>{
                setProducts(prev=>prev.filter(p=>p.id!==deleteTarget.id));
                setDeleteTarget(null);
              }}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── PRINT PREVIEW ────────────────────────────────────────────────────────────
function PrintPreview({p, school, addr}) {
  const chk = v => v ? "☑" : "☐";
  const c = p || {};
  const ctrl = c.controls || c; // support both formats

  const hazCells = HAZARDS.map(h => {
    const sel = (c.hazards||[]).includes(h.key);
    return (
      <div key={h.key} style={{display:"flex",flexDirection:"column",alignItems:"center",
        border:sel?"2px solid #c00":"1px solid #ccc",padding:3,width:76,
        background:sel?"#fff8f0":"white",opacity:sel?1:.35}}>
        <img src={HIMGS[h.img]} alt={h.label} style={{width:26,height:26,objectFit:"contain"}} />
        <div style={{fontSize:"5.5pt",textAlign:"center",lineHeight:1.2,marginTop:2}}>{h.label}</div>
        <div style={{fontSize:"9pt"}}>{sel?"☑":"☐"}</div>
      </div>
    );
  });

  const td = {border:"1px solid #666",padding:"3px 5px",verticalAlign:"top",fontSize:"7.5pt"};
  const th = {...td,background:"#d4edda",fontWeight:"bold",fontSize:"7pt"};

  return (
    <div className="print-area" style={{background:"white",maxWidth:1060,margin:"0 auto",
      padding:"16px 20px",boxShadow:"0 4px 24px rgba(0,0,0,.12)",fontFamily:"Arial,sans-serif",
      fontSize:"8pt",color:"#000",lineHeight:1.3}}>

      <div style={{textAlign:"center",fontWeight:"bold",fontSize:"12pt",borderBottom:"2px solid #000",paddingBottom:6,marginBottom:4}}>
        COSHH Assessment Form — Subject to Control of Substances Hazardous to Health Regulations
      </div>
      <div style={{textAlign:"center",fontSize:"7.5pt",color:"#333",marginBottom:8,fontStyle:"italic"}}>
        {school && <strong>{school}</strong>}{addr && ` — ${addr}`}<br/>
        This risk assessment is to be used to identify risks and control measures for hazardous substances but not Zoonosis or Biological agents.
      </div>
      <div style={{background:"#fff8dc",border:"1px solid #e6c800",padding:"3px 6px",fontSize:"6.5pt",fontStyle:"italic",marginBottom:6}}>
        Note: The use of pesticides/herbicides must be recorded on the Pesticide Record sheet.
      </div>

      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:4}}>
        <tbody>
          <tr>
            <th style={th}>Name of Hazardous Substance / Description of Process</th>
            <th style={th}>Location</th><th style={th}>Task / Process</th>
            <th style={th}>Date of Assessment</th><th style={th}>Date of Review</th>
          </tr>
          <tr>
            <td style={td}><strong>{c.productName}</strong>{c.processDesc&&<><br/><span style={{fontSize:"7pt",color:"#555"}}>{c.processDesc}</span></>}</td>
            <td style={td}>{c.location}</td><td style={td}>{c.task}</td>
            <td style={td}>{c.assessDate ? new Date(c.assessDate).toLocaleDateString("en-GB") : "—"}</td>
            <td style={td}>{c.reviewDate ? new Date(c.reviewDate).toLocaleDateString("en-GB") : "—"}</td>
          </tr>
          <tr>
            <th style={th}>Manufacturer</th><th style={{...th}} colSpan={2}>Address</th>
            <th style={th}>Tel</th><th style={th}>SDS Ref & Date</th>
          </tr>
          <tr>
            <td style={td}>{c.manufacturer}</td><td style={td} colSpan={2}>{c.mfrAddress}</td>
            <td style={td}>{c.mfrTel}</td>
            <td style={td}>
              {c.sdsRef}<br/>
              <span style={{fontSize:"6.5pt"}}>SDS Attached: {c.sdsAttached||"Yes"}</span>
              {c.sdsUrl && <><br/><span style={{fontSize:"6pt",color:"#1a5c32"}}>URL: {c.sdsUrl}</span></>}
              {c.sdsFilename && <><br/><span style={{fontSize:"6pt",color:"#16a34a"}}>File: {c.sdsFilename}</span></>}
            </td>
          </tr>
        </tbody>
      </table>

      <div style={{background:"#1a5c32",color:"white",fontWeight:"bold",fontSize:"7.5pt",padding:"3px 6px",marginBottom:0}}>
        HAZARD CLASSIFICATION — Tick Appropriate Boxes
      </div>
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:4}}>
        <tbody><tr>
          <td style={{...td,width:"62%"}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:4}}>{hazCells}</div>
            <div><strong style={{fontSize:"6.5pt"}}>H Phrases: </strong><span style={{fontSize:"7.5pt"}}>{c.hPhrases||"—"}</span></div>
          </td>
          <td style={td}>
            <strong style={{fontSize:"6.5pt",display:"block",marginBottom:4}}>About the Substance</strong>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:"7pt"}}>
              <tbody>
                <tr><td style={{padding:2}}><strong>Form:</strong> {c.substanceForm||"—"}</td><td style={{padding:2}}><strong>Dilution:</strong> {c.dilution||"—"}</td></tr>
                <tr><td colSpan={2} style={{padding:2}}><strong>Route of Entry:</strong> {(c.routeOfEntry||[]).join(", ")||"—"}</td></tr>
                <tr><td style={{padding:2}}><strong>WEL?</strong> {c.wel||"—"}</td><td style={{padding:2}}><strong>Exceeded?</strong> {c.welExceeded||"—"}</td></tr>
                <tr><td colSpan={2} style={{padding:2}}><strong>H&S advisor contacted?</strong> {c.welHSContacted||"N/A"}</td></tr>
                <tr><td colSpan={2} style={{padding:2}}><strong>Amount stored:</strong> {c.amountStored||"—"} | <strong>Per op:</strong> {c.amountUsed||"—"}</td></tr>
                <tr><td style={{padding:2}}><strong>Duration:</strong> {c.duration||"—"}</td><td style={{padding:2}}><strong>Frequency:</strong> {c.frequency||"—"}</td></tr>
              </tbody>
            </table>
          </td>
        </tr></tbody>
      </table>

      <div style={{background:"#1a5c32",color:"white",fontWeight:"bold",fontSize:"7.5pt",padding:"3px 6px"}}>
        CONTROLS REQUIRED — <span style={{fontWeight:"normal"}}>NB: Controls are identified within Safety Data Sheets and guidance found in the Corporate PPE procedure.</span>
      </div>
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:4}}>
        <tbody>
          <tr>
            <td style={{...td,width:"12%"}}><strong>Ventilation</strong></td>
            <td style={td}>{chk(c.ventGeneral)} General &nbsp; {chk(c.ventLEV)} LEV &nbsp; {chk(c.airMonitor)} Air Monitor &nbsp; {chk(c.ventNA)} N/A</td>
            <td style={{...td,width:"12%"}}><strong>Skin Protection</strong></td>
            <td style={td}>{chk(c.preCreams)} Pre-work Creams &nbsp; {chk(c.gloves)} Gloves &nbsp; {chk(c.apron)} Apron &nbsp; {chk(c.footwear)} Footwear{c.footwearType&&`: ${c.footwearType}`} &nbsp; {chk(c.skinNA)} N/A</td>
          </tr>
          <tr>
            <td style={td}><strong>Respiratory</strong></td>
            <td style={td}>{chk(c.halfMask)} Half Mask &nbsp; {chk(c.fullMask)} Full Mask &nbsp; {chk(c.dustMask)} Dust Mask &nbsp; {chk(c.respNA)} N/A {c.protFactor&&`— RPF: ${c.protFactor}`}</td>
            <td style={td}><strong>Eye & Face</strong></td>
            <td style={td}>{chk(c.safetySpecs)} Spectacles &nbsp; {chk(c.goggles)} Goggles &nbsp; {chk(c.faceShield)} Face Shield &nbsp; {chk(c.eyeNA)} N/A</td>
          </tr>
          <tr>
            <td style={td} colSpan={2}><strong>Health Surveillance: </strong>{chk(c.staffTrained)} Self-exam &nbsp; {chk(c.healthSurv)} Surveillance req. &nbsp; {chk(c.occupHealth)} OCU programme &nbsp; {chk(c.sysMonitored)} System monitored</td>
            <td style={td} colSpan={2}>
                <strong>Stand-alone product?</strong> {c.standalone||"—"} &nbsp;|&nbsp;
                <strong>Used in combination?</strong> {c.accumulated||"—"} &nbsp;|&nbsp;
                <strong>Accumulation considered?</strong> {c.separateAssess||"—"} &nbsp;|&nbsp;
                <strong>Separate assessment in place?</strong> {c.separateAssessConfirm?"Yes":"No"}
              </td>
          </tr>
        </tbody>
      </table>

      <div style={{background:"#1a5c32",color:"white",fontWeight:"bold",fontSize:"7.5pt",padding:"3px 6px"}}>
        SAFE WORKING INSTRUCTIONS FOR OPERATIVE — <span style={{fontWeight:"normal"}}>Share with all persons carrying out tasks where hazardous substances are used.</span>
      </div>
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:4}}>
        <tbody>
          <tr>
            <th style={{...th,width:"17%"}}>Storage (location, conditions, compatibility)</th>
            <th style={{...th,width:"22%"}}>Instructions for Use (dilution, application, ventilation)</th>
            <th style={{...th,width:"15%"}}>Control Measures (PPE, LEV, barriers)</th>
            <th style={{...th,width:"15%"}}>Clean Up & Disposal</th>
            <th style={{...th,width:"16%"}}>First Aid</th>
            <th style={{...th,width:"15%"}}>Fire Precautions</th>
          </tr>
          <tr style={{verticalAlign:"top"}}>
            <td style={{...td,minHeight:40}}>{c.storage}</td>
            <td style={td}>{c.useInstructions}</td>
            <td style={td}>{c.controlMeasures}</td>
            <td style={td}>{c.disposal}</td>
            <td style={td}>{c.firstAid}</td>
            <td style={td}>{c.fire}</td>
          </tr>
          {c.notes && <><tr><th style={{...th}} colSpan={6}>Further Considerations</th></tr>
          <tr><td style={td} colSpan={6}>{c.notes}</td></tr></>}
        </tbody>
      </table>

      <div style={{background:"#1a5c32",color:"white",fontWeight:"bold",fontSize:"7.5pt",padding:"3px 6px"}}>SIGN-OFF</div>
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:6}}>
        <tbody>
          <tr>
            <td style={{...td,width:"44%",fontSize:"7pt"}}>As the <strong>Assessor</strong> I have considered the current, and any additional controls. I consider this activity to have been reduced to a level that is acceptable or as low as is reasonably practicable.</td>
            <th style={th}>Name / Job Title</th><th style={th}>Signed</th><th style={th}>Date</th>
          </tr>
          <tr>
            <td style={{...td,fontSize:"7pt",fontStyle:"italic"}}>Assessor</td>
            <td style={{...td,height:32}}>{c.assessorName}{c.assessorTitle&&` / ${c.assessorTitle}`}</td>
            <td style={{...td,height:32,borderBottom:"1px solid #333"}}>&nbsp;</td>
            <td style={{...td,height:32}}>{c.assessDate ? new Date(c.assessDate).toLocaleDateString("en-GB") : ""}</td>
          </tr>
          <tr>
            <td style={{...td,fontSize:"7pt"}}>As the <strong>Responsible Manager</strong>, I can confirm that the information provided is relevant to the individual substance for the purpose of its use on this occasion. I have informed all other persons using this substance of the control measures in place.</td>
            <th style={th}>Name / Job Title</th><th style={th}>Signed</th><th style={th}>Date</th>
          </tr>
          <tr>
            <td style={{...td,fontSize:"7pt",fontStyle:"italic"}}>Responsible Manager</td>
            <td style={{...td,height:32}}>{c.managerName}{c.managerTitle&&` / ${c.managerTitle}`}</td>
            <td style={{...td,height:32,borderBottom:"1px solid #333"}}>&nbsp;</td>
            <td style={{...td,height:32,borderBottom:"1px solid #333"}}>&nbsp;</td>
          </tr>
        </tbody>
      </table>

      <div style={{fontSize:"6pt",color:"#555",borderTop:"1px solid #ccc",paddingTop:4}}>
        <strong>Original risk assessments must be kept for a period of 40 years.</strong> On completion a hard copy should be printed off and placed in your local/site health and safety folder and hazards, risks and control measures implemented should be communicated to all individuals identified at risk within this risk assessment. | Generated: {new Date().toLocaleDateString("en-GB")} | {school}
      </div>
    </div>
  );
}

  </script>
  <script>
    window.addEventListener("load", function() {
      const src = document.getElementById("app-src").textContent;
      const transformed = Babel.transform(src, { presets: ["react"] }).code;
      eval(transformed);
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(App));
    });
  </script>
</body>
</html>
